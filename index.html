    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #0f3460);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 40px 28px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s;
        }
        .avatar {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background: #00ffcc10;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #00ffcc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .badge {
            display: inline-block;
            background: #00ffcc20;
            backdrop-filter: blur(4px);
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            border: 1px solid #00ffcc80;
            color: #00ffcc;
        }
        .description {
            font-size: 1rem;
            line-height: 1.7;
            margin: 20px 0;
            color: #e0e0e0;
        }
        .description p {
            margin-bottom: 10px;
        }
        .contact-phone {
            background: rgba(255,255,255,0.1);
            border-radius: 60px;
            padding: 10px 18px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin: 15px 0 20px;
            font-size: 1.1rem;
            font-weight: 500;
            direction: ltr;
            font-family: monospace;
        }
        .contact-phone i {
            font-size: 1.3rem;
        }
        .links {
            display: flex;
 f
 lex-direction: column;

            color: #1e1e2f;

            font-weight: 700;
            transition: all 0.2s ease;
            font-size: 1.1rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .links a i {

        }
        .links a:active {
            transform: scale(0.98);
        }
        /* WhatsApp */
        .links a.whatsapp:hover,
        .links a.whatsapp:active {
            background: #25D366;
            color: white;
            box-shadow: 0 0 15px #25D366;
        }
        /* Facebook */
        .links a.facebook:hover,

            color: white;

        }

                padding: 8px 14px;
            }
        }
